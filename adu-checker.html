<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADU Checker – Blackstone Construction</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#1a1a1a}
.hd{background:#1a2332;padding:22px 20px 20px}
.hd h1{font-size:19px;font-weight:500;color:#f0ede8;margin-bottom:4px}
.hd p{font-size:12px;color:#8a9bb0}
.sb{background:#1a2332;padding:0 20px 18px}
.sf{display:flex;gap:8px}
.si{flex:1;padding:11px 14px;border-radius:8px;border:2px solid transparent;font-size:14px;outline:none}
.si:focus{border-color:#4a9eff}
.sk{padding:0 20px;height:44px;background:#EF9F27;color:#412402;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.sk:hover{opacity:.88}
#er{display:none;margin:12px 20px;padding:10px 14px;background:#fff0f0;border:1px solid #f09595;border-radius:8px;font-size:13px;color:#7a1f1f}
#rs{display:none;padding-bottom:8px}
.pb{background:#f2f1ec;padding:12px 20px;display:flex;gap:10px;align-items:flex-start}
.pp{width:28px;height:28px;background:#1a2332;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:#f0ede8;flex-shrink:0;margin-top:1px}
.pa{font-size:13px;font-weight:500;margin-bottom:4px}
.ts{display:flex;flex-wrap:wrap;gap:4px}
.tg{font-size:10px;padding:2px 8px;background:#fff;border:.5px solid #ccc;border-radius:10px;color:#555}
.vd{margin:14px 20px;border-radius:10px;padding:14px 16px;border:1.5px solid}
.vd.pass{background:#edf7e0;border-color:#8dc44a}
.vd.warn{background:#fef5e6;border-color:#f5c842}
.vd.fail{background:#fff0f0;border-color:#f09090}
.vl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.vd.pass .vl{color:#3a6b10}.vd.warn .vl{color:#634005}.vd.fail .vl{color:#7a1f1f}
.vt{font-size:17px;font-weight:600}
.vd.pass .vt{color:#265009}.vd.warn .vt{color:#3f2602}.vd.fail .vt{color:#501010}
.vs{font-size:12px;margin-top:3px;line-height:1.5}
.vd.pass .vs{color:#3a6b10}.vd.warn .vs{color:#854f0b}.vd.fail .vs{color:#9a3030}
.vps{display:flex;gap:12px;margin-top:9px;padding-top:9px;border-top:.5px solid rgba(0,0,0,.08);font-size:11px;font-weight:500}
.vp{color:#265009}.vw{color:#634005}.vf{color:#7a1f1f}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px 14px}
.sc{background:#f7f6f2;border-radius:8px;padding:12px 14px}
.sl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#999;margin-bottom:3px}
.sv{font-size:22px;font-weight:600;color:#1a2332}
.sn{font-size:10px;color:#bbb;margin-top:2px}
.cw{padding:0 20px 14px}
.ch{font-size:11px;color:#999;margin-bottom:7px}
.ci{display:flex;gap:9px;align-items:flex-start;border-radius:8px;padding:9px 11px;border:.5px solid;margin-bottom:6px}
.ci:last-child{margin-bottom:0}
.ci.pass{background:#edf7e0;border-color:#b5d97a}
.ci.warn{background:#fef5e6;border-color:#f5d67a}
.ci.fail{background:#fff0f0;border-color:#f0a0a0}
.ii{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px}
.ci.pass .ii{background:#5a9e1a;color:#fff}
.ci.warn .ii{background:#e09020;color:#fff}
.ci.fail .ii{background:#d04040;color:#fff}
.ct{font-size:12px;font-weight:600}
.ci.pass .ct{color:#265009}.ci.warn .ct{color:#3f2602}.ci.fail .ct{color:#7a1f1f}
.cd{font-size:11px;margin-top:2px;line-height:1.5}
.ci.pass .cd{color:#3a6b10}.ci.warn .cd{color:#7a4e10}.ci.fail .cd{color:#9a3030}
.cn{margin:0 20px 12px;background:#e8f0fb;border:.5px solid #aac4f0;border-radius:8px;padding:9px 12px;font-size:11px;color:#1a4080;line-height:1.6}
.dc{margin:0 20px 12px;font-size:10px;color:#bbb;background:#f7f6f2;border-radius:8px;padding:8px 11px;line-height:1.7}
.ctaw{padding:0 20px 24px}
.ctab{width:100%;padding:13px;background:#1a2332;color:#f0ede8;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:6px}
.ctab:hover{opacity:.88}
.ctan{font-size:11px;color:#bbb;text-align:center}
</style>
</head>
<body>

<div class="hd">
  <h1>Can I build an ADU on my property?</h1>
  <p>Enter any California address — instant check based on CA state law</p>
</div>
<div class="sb">
  <div class="sf">
    <input id="ai" class="si" type="text" placeholder="e.g. 3357 Guluzzo Dr, San Jose, CA 95148" autocomplete="off">
    <button class="sk" onclick="go()">Check eligibility</button>
  </div>
</div>
<div id="er"></div>
<div id="rs"></div>

<script>
// ── Parse address from plain text (zero API calls) ─────────
function parseAddress(raw) {
  var s = raw.trim();

  // Detect state
  var stateMatch = s.match(/\b([A-Z]{2})\b(?:\s+\d{5})?(?:\s*$|,)/);
  var state = stateMatch ? stateMatch[1] : '';
  if (!state) {
    if (/california/i.test(s)) state = 'CA';
  }

  // Detect zip
  var zipMatch = s.match(/\b(\d{5})\b/);
  var zip = zipMatch ? zipMatch[1] : '';

  // Detect city — text between last comma before state and state
  var city = '';
  var parts = s.split(',').map(function(p){ return p.trim(); });
  if (parts.length >= 2) {
    // last part often "CA 95148" or "California"
    // second-to-last is city
    var cityRaw = parts[parts.length - (parts.length >= 3 ? 2 : 1)];
    city = cityRaw.replace(/\b[A-Z]{2}\b/, '').replace(/\d{5}/, '').trim();
  }

  // Street = first part
  var street = parts[0] || s;

  // Is it a residential street type?
  var isRes = /\b(dr|drive|st|street|ave|avenue|blvd|boulevard|way|ct|court|ln|lane|rd|road|pl|place|cir|circle|ter|terrace|loop|walk|path|run|pkwy|parkway)\b/i.test(street);

  return {
    formatted: s,
    street: street,
    city: city,
    state: state,
    zip: zip,
    isRes: isRes
  };
}

// Bay Area cities Blackstone serves
var SVC_AREA = ['san jose','santa clara','sunnyvale','cupertino','milpitas',
  'fremont','campbell','los gatos','saratoga','los altos','mountain view',
  'palo alto','morgan hill','gilroy','burlingame','san mateo','redwood city',
  'menlo park','atherton','portola valley','woodside','los altos hills'];

// CA zip ranges (rough check)
function isCAZip(zip) {
  if (!zip) return true; // benefit of doubt
  var n = parseInt(zip, 10);
  return n >= 90001 && n <= 96162;
}

function evaluate(geo) {
  var checks = [];
  var city  = (geo.city  || '').toLowerCase().trim();
  var state = (geo.state || '').toUpperCase().trim();
  var zip   = geo.zip || '';

  // Determine if CA
  var isCA = state === 'CA' || (!state && isCAZip(zip));

  // 1. California check
  checks.push({
    label: 'California property',
    status: isCA ? 'pass' : (state ? 'fail' : 'warn'),
    detail: isCA
      ? 'California — AB68 (2020) applies statewide to all residential properties'
      : state
        ? state + ' — Blackstone currently serves California only'
        : 'State not detected — add ", CA" to your address to confirm'
  });

  // 2. Residential street
  checks.push({
    label: 'Residential address',
    status: geo.isRes ? 'pass' : 'warn',
    detail: geo.isRes
      ? 'Residential street type detected — all CA residential lots eligible under AB68'
      : 'Add full street type (Dr, Ave, Rd…) for better accuracy — assuming residential'
  });

  // 3. CA state law guarantee
  if (isCA) {
    checks.push({
      label: 'ADU right guaranteed by CA law',
      status: 'pass',
      detail: 'CA AB68 gives every residential owner the right to 1 detached ADU (up to 1,200 sq ft) + 1 JADU (500 sq ft). Cities and HOAs cannot ban them.'
    });
  }

  // 4. Setback
  checks.push({
    label: 'Rear / side setback',
    status: 'warn',
    detail: 'CA law requires minimum 4 ft rear & side setback for detached ADU — confirmed at free site visit'
  });

  // 5. Service area
  var inSvc = SVC_AREA.some(function(c){ return city.indexOf(c) >= 0 || c.indexOf(city) >= 0; });
  var cityLabel = geo.city || city || 'Your area';
  checks.push({
    label: 'Blackstone service area',
    status: city ? (inSvc ? 'pass' : 'warn') : 'warn',
    detail: inSvc
      ? cityLabel + ' — within Blackstone\'s Bay Area service area ✓'
      : cityLabel
        ? cityLabel + ' — contact us to confirm we serve your area'
        : 'Add city to address for service area check'
  });

  // 6. HOA
  checks.push({
    label: 'HOA restrictions',
    status: 'warn',
    detail: 'HOAs cannot ban ADUs in CA under state law — may set design standards. Check your CC&Rs.'
  });

  var nF = checks.filter(function(c){ return c.status==='fail'; }).length;
  var nW = checks.filter(function(c){ return c.status==='warn'; }).length;
  var nP = checks.filter(function(c){ return c.status==='pass'; }).length;

  var ov, os, ob;
  if (nF === 0 && nW <= 1) {
    ov = 'Likely eligible for ADU'; os = 'pass';
    ob = 'Your property meets key requirements under CA state law. A free site visit confirms exact sizing.';
  } else if (nF === 0) {
    ov = 'Eligible — a few items to verify'; os = 'warn';
    ob = 'No hard blockers. Some items need a quick review — book a free call with Blackstone.';
  } else {
    ov = 'May have eligibility issues'; os = 'fail';
    ob = 'One or more requirements may not be met. Contact us to explore your options.';
  }

  return { geo:geo, checks:checks, nP:nP, nW:nW, nF:nF, ov:ov, os:os, ob:ob };
}

function go() {
  var raw = document.getElementById('ai').value.trim();
  if (!raw) { showErr('Please enter a property address.'); return; }

  hide('er'); hide('rs');

  var geo    = parseAddress(raw);
  var result = evaluate(geo);
  render(result);
}

function render(r) {
  var ic = { pass:'✓', warn:'!', fail:'✗' };
  var tags = [r.geo.city, r.geo.state||'CA', r.geo.zip]
    .filter(Boolean)
    .map(function(t){ return '<span class="tg">'+t+'</span>'; }).join('');

  var cks = r.checks.map(function(c){
    return '<div class="ci '+c.status+'">'
      +'<div class="ii">'+ic[c.status]+'</div>'
      +'<div><div class="ct">'+c.label+'</div>'
      +'<div class="cd">'+c.detail+'</div></div></div>';
  }).join('');

  document.getElementById('rs').innerHTML =
    '<div class="pb"><div class="pp">📍</div><div>'
      +'<div class="pa">'+r.geo.formatted+'</div>'
      +'<div class="ts">'+tags+'</div>'
    +'</div></div>'

    +'<div class="vd '+r.os+'">'
      +'<div class="vl">Overall result</div>'
      +'<div class="vt">'+r.ov+'</div>'
      +'<div class="vs">'+r.ob+'</div>'
      +'<div class="vps">'
        +'<span class="vp">'+r.nP+' passed</span>'
        +'<span class="vw">'+r.nW+' to verify</span>'
        +'<span class="vf">'+r.nF+' blocked</span>'
      +'</div>'
    +'</div>'

    +'<div class="sg">'
      +'<div class="sc"><div class="sl">Max detached ADU</div><div class="sv">1,200 sq ft</div><div class="sn">CA AB68 state limit</div></div>'
      +'<div class="sc"><div class="sl">Max JADU</div><div class="sv">500 sq ft</div><div class="sn">Inside existing home</div></div>'
    +'</div>'

    +'<div class="cw"><div class="ch">Eligibility checks ('+r.checks.length+')</div>'+cks+'</div>'

    +'<div class="cn">📋 Under CA AB68 (2020), all residential owners have the <strong>legal right to build an ADU</strong>. Cities and HOAs cannot ban them outright.</div>'

    +'<div class="dc">Based on CA state ADU law. Local ordinances may add design requirements. For informational purposes only — not a permit approval.</div>'

    +'<div class="ctaw">'
      +'<button class="ctab" onclick="window.open(\'https://www.blackstonednb.com/contact\',\'_blank\')">'
        +'Book free consultation — (408) 785-9999'
      +'</button>'
      +'<div class="ctan">30-min call · No obligation · Same-week availability</div>'
    +'</div>';

  show('rs');
}

// Enter key support
document.getElementById('ai').addEventListener('keydown', function(e){
  if (e.key === 'Enter') go();
});

function show(id){ document.getElementById(id).style.display='block'; }
function hide(id){ document.getElementById(id).style.display='none'; }
function showErr(m){ var e=document.getElementById('er'); e.textContent=m; e.style.display='block'; }
</script>
</body>
</html>
