<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADU Feasibility Checker – Blackstone Construction</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 0;
  }

  /* ── Header ── */
  .header {
    background: #1a2332;
    padding: 28px 24px 24px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 500;
    color: #f0ede8;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 13px;
    color: #8a9bb0;
    line-height: 1.5;
  }

  /* ── Search bar ── */
  .search-wrap {
    background: #1a2332;
    padding: 0 24px 20px;
  }
  .search-row {
    display: flex;
    gap: 8px;
  }
  .search-input {
    flex: 1;
    padding: 11px 14px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    background: #fff;
    color: #1a1a1a;
    outline: none;
  }
  .search-input:focus {
    box-shadow: 0 0 0 2px #4a9eff;
  }
  .search-btn {
    padding: 11px 20px;
    background: #EF9F27;
    color: #412402;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .15s;
  }
  .search-btn:hover { opacity: .88; }
  .search-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Autocomplete dropdown ── */
  .autocomplete-wrap { position: relative; flex: 1; }
  .autocomplete-list {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: #fff;
    border-radius: 8px;
    border: 1px solid #ddd;
    z-index: 100;
    overflow: hidden;
    display: none;
  }
  .autocomplete-list.show { display: block; }
  .autocomplete-item {
    padding: 10px 14px;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 0.5px solid #f0f0f0;
    line-height: 1.4;
  }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover { background: #f5f4f0; }
  .autocomplete-item .main { font-weight: 500; color: #1a1a1a; }
  .autocomplete-item .sub { font-size: 11px; color: #888; margin-top: 1px; }

  /* ── Loading ── */
  .loading {
    display: none;
    padding: 40px 24px;
    text-align: center;
  }
  .loading.show { display: block; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #ddd;
    border-top-color: #1a2332;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 13px; color: #666; }
  .loading .step-label {
    font-size: 11px;
    color: #999;
    margin-top: 4px;
  }

  /* ── Error ── */
  .error-box {
    display: none;
    margin: 16px 24px;
    background: #fff0f0;
    border: 1px solid #f09595;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    color: #791f1f;
  }
  .error-box.show { display: block; }

  /* ── Results ── */
  .results {
    display: none;
    padding: 16px 24px 32px;
  }
  .results.show { display: block; }

  /* Property summary card */
  .prop-card {
    background: #fff;
    border-radius: 10px;
    border: 0.5px solid #ddd;
    padding: 14px 16px;
    margin-bottom: 14px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .prop-pin {
    width: 32px; height: 32px;
    background: #1a2332;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
  }
  .prop-address { font-size: 13px; font-weight: 500; color: #1a1a1a; margin-bottom: 6px; }
  .prop-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .prop-tag {
    font-size: 11px;
    padding: 2px 8px;
    background: #f0f0f0;
    border-radius: 20px;
    color: #444;
  }

  /* Overall verdict */
  .verdict {
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 14px;
    border: 1px solid;
  }
  .verdict.pass  { background: #eaf3de; border-color: #97c459; }
  .verdict.warn  { background: #faeeda; border-color: #fac775; }
  .verdict.fail  { background: #fcebeb; border-color: #f09595; }
  .verdict-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
  .verdict.pass  .verdict-label { color: #3b6d11; }
  .verdict.warn  .verdict-label { color: #633806; }
  .verdict.fail  .verdict-label { color: #791f1f; }
  .verdict-title { font-size: 16px; font-weight: 500; }
  .verdict.pass  .verdict-title { color: #27500a; }
  .verdict.warn  .verdict-title { color: #412402; }
  .verdict.fail  .verdict-title { color: #501313; }
  .verdict-sub { font-size: 12px; margin-top: 3px; }
  .verdict.pass  .verdict-sub { color: #3b6d11; }
  .verdict.warn  .verdict-sub { color: #854f0b; }
  .verdict.fail  .verdict-sub { color: #a32d2d; }

  /* ADU size estimate */
  .size-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }
  .size-card {
    background: #fff;
    border: 0.5px solid #ddd;
    border-radius: 10px;
    padding: 12px 14px;
  }
  .size-label { font-size: 10px; color: #888; margin-bottom: 3px; text-transform: uppercase; letter-spacing: .05em; }
  .size-val { font-size: 18px; font-weight: 500; color: #1a2332; }
  .size-note { font-size: 10px; color: #999; margin-top: 2px; }

  /* Checklist */
  .checks-title { font-size: 12px; color: #666; margin-bottom: 8px; }
  .check-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .check-item {
    display: flex; gap: 10px; align-items: flex-start;
    border-radius: 8px; padding: 10px 12px; border: 0.5px solid;
  }
  .check-item.pass { background: #eaf3de; border-color: #c0dd97; }
  .check-item.warn { background: #faeeda; border-color: #fac775; }
  .check-item.fail { background: #fcebeb; border-color: #f7c1c1; }
  .check-icon {
    width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
  }
  .check-item.pass .check-icon { background: #639922; color: #fff; }
  .check-item.warn .check-icon { background: #EF9F27; color: #fff; }
  .check-item.fail .check-icon { background: #E24B4A; color: #fff; }
  .check-title { font-size: 12px; font-weight: 500; }
  .check-item.pass .check-title { color: #27500a; }
  .check-item.warn .check-title { color: #412402; }
  .check-item.fail .check-title { color: #791f1f; }
  .check-detail { font-size: 11px; margin-top: 2px; line-height: 1.5; }
  .check-item.pass .check-detail { color: #3b6d11; }
  .check-item.warn .check-detail { color: #854f0b; }
  .check-item.fail .check-detail { color: #a32d2d; }

  /* Disclaimer */
  .disclaimer {
    font-size: 10px;
    color: #999;
    line-height: 1.6;
    padding: 10px 12px;
    background: #f5f4f0;
    border-radius: 8px;
    margin-bottom: 14px;
  }

  /* CTA */
  .cta-section { text-align: center; }
  .cta-btn {
    display: block;
    width: 100%;
    padding: 13px;
    background: #1a2332;
    color: #f0ede8;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 8px;
    transition: opacity .15s;
  }
  .cta-btn:hover { opacity: .88; }
  .cta-note { font-size: 11px; color: #999; }

  /* Source tags */
  .source-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 14px;
    align-items: center;
  }
  .source-label { font-size: 10px; color: #999; }
  .source-tag {
    font-size: 10px;
    padding: 2px 7px;
    background: #e6f1fb;
    color: #0c447c;
    border-radius: 20px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Can I build an ADU on my property?</h1>
  <p>Enter your address — we check zoning, lot size, fire hazard, and flood zone instantly.</p>
</div>

<div class="search-wrap">
  <div class="search-row">
    <div class="autocomplete-wrap">
      <input
        id="addressInput"
        class="search-input"
        type="text"
        placeholder="e.g. 1460 Tully Rd, San Jose, CA"
        autocomplete="off"
      >
      <div class="autocomplete-list" id="autocompleteList"></div>
    </div>
    <button class="search-btn" id="checkBtn" onclick="runCheck()">Check eligibility</button>
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>Checking your property…</p>
  <div class="step-label" id="loadingStep">Geocoding address…</div>
</div>

<div class="error-box" id="errorBox"></div>

<div class="results" id="results"></div>

<script>
// ══════════════════════════════════════════════
//  CONFIG — replace with your keys
// ══════════════════════════════════════════════
const CONFIG = {
  // Get free key: console.cloud.google.com → Maps → Geocoding API
  // Restrict key to your domain in API console for security
  GOOGLE_API_KEY: 'AIzaSyAAVLJN8u5lcaIv9_S0iLZt17lPVPodjWw',

  // All ArcGIS endpoints below are FREE, no key needed
  ZONING_SAN_JOSE_URL:
    'https://services5.arcgis.com/7Sr2ufOHSNJF6XOE/arcgis/rest/services/Zoning/FeatureServer/0/query',
  PARCEL_SCC_URL:
    'https://services.arcgis.com/TSeevZenKbEfxKyF/arcgis/rest/services/SCC_Parcels/FeatureServer/0/query',
  FIRE_HAZARD_URL:
    'https://egis.fire.ca.gov/arcgis/rest/services/FHSZ/MapServer/0/query',
  FLOOD_ZONE_URL:
    'https://hazards.fema.gov/arcgis/rest/services/public/NFHL/MapServer/28/query',

  // Booking page URL on your Wix site
  BOOKING_URL: '/book-consultation',
};

// ══════════════════════════════════════════════
//  AUTOCOMPLETE (Google Places Autocomplete)
// ══════════════════════════════════════════════
let autocompleteTimeout;
const input = document.getElementById('addressInput');
const list  = document.getElementById('autocompleteList');

input.addEventListener('input', () => {
  clearTimeout(autocompleteTimeout);
  const q = input.value.trim();
  if (q.length < 4) { list.classList.remove('show'); return; }
  autocompleteTimeout = setTimeout(() => fetchSuggestions(q), 300);
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') { list.classList.remove('show'); runCheck(); }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.autocomplete-wrap')) list.classList.remove('show');
});

async function fetchSuggestions(query) {
  // Google Places Autocomplete (same API key, no extra billing for first 10k/month)
  const url = `https://maps.googleapis.com/maps/api/place/autocomplete/json`
    + `?input=${encodeURIComponent(query)}`
    + `&components=country:us&types=address`
    + `&key=${CONFIG.GOOGLE_API_KEY}`;

  // NOTE: In Wix Velo, call this from backend to hide key.
  // In plain HTML (GitHub Pages), use a CORS proxy or restrict domain in Google Console.
  try {
    const res  = await fetch(url);
    const data = await res.json();
    showSuggestions(data.predictions || []);
  } catch {
    // Silently fail — user can still type full address
  }
}

function showSuggestions(predictions) {
  list.innerHTML = '';
  if (!predictions.length) { list.classList.remove('show'); return; }
  predictions.slice(0, 5).forEach(p => {
    const item = document.createElement('div');
    item.className = 'autocomplete-item';
    const main = p.structured_formatting?.main_text   || p.description;
    const sub  = p.structured_formatting?.secondary_text || '';
    item.innerHTML = `<div class="main">${main}</div>${sub ? `<div class="sub">${sub}</div>` : ''}`;
    item.addEventListener('click', () => {
      input.value = p.description;
      list.classList.remove('show');
      runCheck();
    });
    list.appendChild(item);
  });
  list.classList.add('show');
}

// ══════════════════════════════════════════════
//  MAIN CHECK FLOW
// ══════════════════════════════════════════════
async function runCheck() {
  const address = input.value.trim();
  if (!address) { showError('Please enter a property address.'); return; }

  showLoading(true);
  hideResults();
  hideError();

  try {
    // Step 1: Geocode
    setLoadingStep('Geocoding address…');
    const geo = await geocodeAddress(address);

    // Step 2: Parallel fetch — zoning + parcel + fire + flood
    setLoadingStep('Fetching zoning & parcel data…');
    const [zoning, parcel, fire, flood] = await Promise.all([
      fetchZoning(geo.lat, geo.lng),
      fetchParcel(geo.lat, geo.lng),
      fetchFireZone(geo.lat, geo.lng),
      fetchFloodZone(geo.lat, geo.lng),
    ]);

    // Step 3: Evaluate
    setLoadingStep('Evaluating ADU eligibility…');
    const result = evaluateADU(geo, zoning, parcel, fire, flood);

    showLoading(false);
    renderResults(result);

  } catch (err) {
    showLoading(false);
    showError(err.message || 'Something went wrong. Please try again.');
  }
}

// ══════════════════════════════════════════════
//  API CALLS
// ══════════════════════════════════════════════
async function geocodeAddress(address) {
  const url = `https://maps.googleapis.com/maps/api/geocode/json`
    + `?address=${encodeURIComponent(address)}`
    + `&key=${CONFIG.GOOGLE_API_KEY}`;
  const res  = await fetch(url);
  const data = await res.json();
  if (data.status !== 'OK') throw new Error('Address not found. Please check the address and try again.');
  const r = data.results[0];
  return {
    formatted: r.formatted_address,
    lat: r.geometry.location.lat,
    lng: r.geometry.location.lng,
    city: r.address_components.find(c => c.types.includes('locality'))?.long_name || '',
    state: r.address_components.find(c => c.types.includes('administrative_area_level_1'))?.short_name || '',
    zip: r.address_components.find(c => c.types.includes('postal_code'))?.long_name || '',
  };
}

async function fetchZoning(lat, lng) {
  const params = new URLSearchParams({
    geometry: `${lng},${lat}`,
    geometryType: 'esriGeometryPoint',
    spatialRel: 'esriSpatialRelIntersects',
    outFields: 'ZONING,ZONE_DESCRIPTION,GENERAL_PLAN,OVERLAY',
    returnGeometry: 'false',
    f: 'json',
  });
  try {
    const res  = await fetch(`${CONFIG.ZONING_SAN_JOSE_URL}?${params}`);
    const data = await res.json();
    return data.features?.[0]?.attributes || null;
  } catch { return null; }
}

async function fetchParcel(lat, lng) {
  const params = new URLSearchParams({
    geometry: `${lng},${lat}`,
    geometryType: 'esriGeometryPoint',
    spatialRel: 'esriSpatialRelIntersects',
    outFields: 'APN,LOT_SIZE_SF,ZONING,USE_CODE,YEAR_BUILT,UNITS',
    returnGeometry: 'false',
    f: 'json',
  });
  try {
    const res  = await fetch(`${CONFIG.PARCEL_SCC_URL}?${params}`);
    const data = await res.json();
    return data.features?.[0]?.attributes || null;
  } catch { return null; }
}

async function fetchFireZone(lat, lng) {
  const params = new URLSearchParams({
    geometry: `${lng},${lat}`,
    geometryType: 'esriGeometryPoint',
    spatialRel: 'esriSpatialRelIntersects',
    outFields: 'SRA,HAZ_CLASS',
    returnGeometry: 'false',
    f: 'json',
  });
  try {
    const res  = await fetch(`${CONFIG.FIRE_HAZARD_URL}?${params}`);
    const data = await res.json();
    return data.features?.[0]?.attributes || null;
  } catch { return null; }
}

async function fetchFloodZone(lat, lng) {
  const params = new URLSearchParams({
    geometry: `${lng},${lat}`,
    geometryType: 'esriGeometryPoint',
    spatialRel: 'esriSpatialRelIntersects',
    outFields: 'FLD_ZONE,ZONE_SUBTY',
    returnGeometry: 'false',
    f: 'json',
  });
  try {
    const res  = await fetch(`${CONFIG.FLOOD_ZONE_URL}?${params}`);
    const data = await res.json();
    return data.features?.[0]?.attributes || null;
  } catch { return null; }
}

// ══════════════════════════════════════════════
//  ADU ELIGIBILITY ENGINE
//  Based on California ADU law (AB68, AB3182, SB9, SB10)
// ══════════════════════════════════════════════
function evaluateADU(geo, zoning, parcel, fire, flood) {
  const checks = [];

  // ── Pull data, with fallbacks ──
  const zoningCode = zoning?.ZONING || parcel?.ZONING || 'Unknown';
  const zoningDesc = zoning?.ZONE_DESCRIPTION || '';
  const lotSqFt    = parcel?.LOT_SIZE_SF   || 0;
  const numUnits   = parcel?.UNITS         || 1;
  const useCode    = parcel?.USE_CODE      || '';
  const yearBuilt  = parcel?.YEAR_BUILT    || null;
  const fireClass  = fire?.HAZ_CLASS       || '';
  const floodZone  = flood?.FLD_ZONE       || 'X';

  // ── Check 1: Zoning ──
  const residPrefixes = ['R1','R2','R3','R4','RM','RH','RD','SR','A1','A2','PD','RR'];
  const isResidential = residPrefixes.some(p => zoningCode.toUpperCase().startsWith(p));
  checks.push({
    id: 'zoning',
    label: 'Zoning allows ADU',
    status: isResidential ? 'pass' : (zoningCode === 'Unknown' ? 'warn' : 'fail'),
    detail: zoningCode === 'Unknown'
      ? 'Could not retrieve zoning data — contact city planning'
      : isResidential
        ? `${zoningCode}${zoningDesc ? ' — ' + zoningDesc : ''} · Residential zones permit ADUs under CA law`
        : `${zoningCode} — Non-residential zone, ADU likely not permitted`,
  });

  // ── Check 2: Lot size ──
  if (lotSqFt > 0) {
    const lotOk   = lotSqFt >= 4000;
    const lotGood = lotSqFt >= 6000;
    checks.push({
      id: 'lot_size',
      label: 'Lot size',
      status: lotGood ? 'pass' : lotOk ? 'warn' : 'fail',
      detail: `${lotSqFt.toLocaleString()} sq ft — ${
        lotGood ? 'Good size for detached ADU'
        : lotOk  ? 'Minimum met, but space may be limited for detached ADU'
                 : 'Below 4,000 sq ft minimum for detached ADU — JADU may still be possible'
      }`,
    });
  } else {
    checks.push({
      id: 'lot_size', label: 'Lot size', status: 'warn',
      detail: 'Lot size data not available — contact county assessor',
    });
  }

  // ── Check 3: Property type ──
  const isSFR   = numUnits <= 1;
  const isMFR   = numUnits >= 2;
  checks.push({
    id: 'property_type', label: 'Property type', status: 'pass',
    detail: isSFR
      ? 'Single-family residence — eligible for 1 detached ADU + 1 JADU (Junior ADU)'
      : `${numUnits}-unit property — eligible for ADUs on up to 25% of existing units`,
  });

  // ── Check 4: Setbacks (advisory, always) ──
  checks.push({
    id: 'setback', label: 'Rear / side setback', status: 'warn',
    detail: 'CA law requires 4 ft rear & side setback for detached ADU — verify actual clearance with a site survey',
  });

  // ── Check 5: Fire hazard zone ──
  const isHighFire = ['HIGH','VERY HIGH','EXTREME'].some(h => fireClass.toUpperCase().includes(h));
  checks.push({
    id: 'fire', label: 'Fire hazard zone',
    status: fireClass ? (isHighFire ? 'warn' : 'pass') : 'warn',
    detail: !fireClass
      ? 'Fire zone data not available — check CAL FIRE maps at osfm.fire.ca.gov'
      : isHighFire
        ? `${fireClass} Fire Hazard Severity Zone — fire-rated materials & ember-resistant vents required`
        : 'Not in high-fire zone — standard construction applies',
  });

  // ── Check 6: Flood zone ──
  const isHighFlood = ['A','AE','AH','AO','VE','V'].includes(floodZone.charAt(0).toUpperCase());
  checks.push({
    id: 'flood', label: 'FEMA flood zone',
    status: isHighFlood ? 'warn' : 'pass',
    detail: isHighFlood
      ? `Zone ${floodZone} — high flood risk area, flood insurance likely required, elevation certificate may be needed`
      : `Zone ${floodZone} — minimal flood risk, no special flood requirements`,
  });

  // ── Max ADU size (CA AB68) ──
  const maxDetached = lotSqFt > 0 ? Math.min(1200, Math.max(150, Math.round(lotSqFt * 0.45))) : 1200;
  const maxJADU     = 500;

  // ── Overall verdict ──
  const nFail = checks.filter(c => c.status === 'fail').length;
  const nWarn = checks.filter(c => c.status === 'warn').length;
  let overall, overallStatus, overallSub;
  if (nFail === 0 && nWarn <= 1) {
    overall = 'Likely eligible for ADU'; overallStatus = 'pass';
    overallSub = 'Most requirements met. A free site visit will confirm.';
  } else if (nFail === 0) {
    overall = 'Eligible — a few items to verify'; overallStatus = 'warn';
    overallSub = 'No hard blockers, but some items need review before design starts.';
  } else {
    overall = 'May have eligibility issues'; overallStatus = 'fail';
    overallSub = 'One or more requirements may not be met. Contact us to review options.';
  }

  return { geo, zoningCode, zoningDesc, lotSqFt, numUnits, yearBuilt,
           maxDetached, maxJADU, checks, overall, overallStatus, overallSub,
           nPass: checks.filter(c => c.status === 'pass').length, nWarn, nFail };
}

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function renderResults(r) {
  const iconMap = { pass: '✓', warn: '!', fail: '✗' };
  const checksHTML = r.checks.map(c => `
    <div class="check-item ${c.status}">
      <div class="check-icon">${iconMap[c.status]}</div>
      <div>
        <div class="check-title">${c.label}</div>
        <div class="check-detail">${c.detail}</div>
      </div>
    </div>`).join('');

  const tags = [
    r.zoningCode !== 'Unknown' ? r.zoningCode : null,
    r.lotSqFt > 0 ? `${r.lotSqFt.toLocaleString()} sq ft lot` : null,
    r.numUnits === 1 ? 'Single-family' : `${r.numUnits}-unit`,
    r.yearBuilt ? `Built ${r.yearBuilt}` : null,
  ].filter(Boolean).map(t => `<span class="prop-tag">${t}</span>`).join('');

  document.getElementById('results').innerHTML = `
    <div class="prop-card">
      <div class="prop-pin">📍</div>
      <div>
        <div class="prop-address">${r.geo.formatted}</div>
        <div class="prop-tags">${tags}</div>
      </div>
    </div>

    <div class="verdict ${r.overallStatus}">
      <div class="verdict-label">Overall result</div>
      <div class="verdict-title">${r.overall}</div>
      <div class="verdict-sub">${r.overallSub}</div>
    </div>

    <div class="size-row">
      <div class="size-card">
        <div class="size-label">Max detached ADU</div>
        <div class="size-val">~${r.maxDetached.toLocaleString()} sq ft</div>
        <div class="size-note">Per CA ADU law (AB68)</div>
      </div>
      <div class="size-card">
        <div class="size-label">Max JADU (Junior ADU)</div>
        <div class="size-val">~${r.maxJADU} sq ft</div>
        <div class="size-note">Within existing structure</div>
      </div>
    </div>

    <div class="checks-title">${r.nPass} passed · ${r.nWarn} to verify · ${r.nFail} failed</div>
    <div class="check-list">${checksHTML}</div>

    <div class="source-row">
      <span class="source-label">Data from:</span>
      <span class="source-tag">San Jose Open Data</span>
      <span class="source-tag">Santa Clara County GIS</span>
      <span class="source-tag">CAL FIRE FHSZ</span>
      <span class="source-tag">FEMA NFHL</span>
    </div>

    <div class="disclaimer">
      Results are for informational purposes only and do not constitute a permit approval or legal opinion.
      Actual eligibility depends on current city regulations, site conditions, and utility capacity.
      Always verify with your local planning department before starting a project.
    </div>

    <div class="cta-section">
      <button class="cta-btn" onclick="bookConsultation()">
        Get free consultation with Blackstone — (408) 785-9999
      </button>
      <div class="cta-note">30-min call · No obligation · Same-week availability</div>
    </div>
  `;

  document.getElementById('results').classList.add('show');
}

function bookConsultation() {
  const address = document.getElementById('addressInput').value;
  const url = CONFIG.BOOKING_URL + '?address=' + encodeURIComponent(address);
  // If embedded in Wix, post message to parent
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'navigate', url }, '*');
  } else {
    window.location.href = url;
  }
}

// ══════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════
function showLoading(on) {
  document.getElementById('loading').classList.toggle('show', on);
  document.getElementById('checkBtn').disabled = on;
  document.getElementById('checkBtn').textContent = on ? 'Checking…' : 'Check eligibility';
}
function hideResults() { document.getElementById('results').classList.remove('show'); }
function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg; el.classList.add('show');
}
function hideError() { document.getElementById('errorBox').classList.remove('show'); }
function setLoadingStep(msg) { document.getElementById('loadingStep').textContent = msg; }
</script>
</body>
</html>
